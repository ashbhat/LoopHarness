name: secret-scan

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  # Pinned: avoids the gitleaks-action root-commit diff bug and the
  # Node 20 deprecation warnings. Bump deliberately.
  GITLEAKS_VERSION: "8.30.1"

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          set -euo pipefail
          url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSfL "$url" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run Gitleaks (full history)
        run: |
          gitleaks git . \
            --config .gitleaks.toml \
            --redact \
            --verbose \
            --exit-code 1 \
            --report-format sarif \
            --report-path gitleaks-results.sarif

      - name: Upload SARIF report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gitleaks-results.sarif
          path: gitleaks-results.sarif
          if-no-files-found: ignore
